name: Bug report
description: Report a reproducible mcp-scorecard problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands and minimal target details. Do not paste secrets.
      placeholder: npx -y mcp-scorecard ...
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Redact private endpoints, tokens and payload data.
