name: Feature request
description: Suggest a new MCP readiness check or workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What should the scorecard help maintainers or agents decide?
    validations:
      required: true
  - type: textarea
    id: scoring
    attributes:
      label: Proposed scoring
      description: How should pass, warn and fail be determined?
  - type: textarea
    id: examples
    attributes:
      label: Example servers or outputs
      description: Link public examples only. Do not include private payloads.
